<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeri Lebaran Keluarga Ikhsan</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #0f3d2e, #14532d);
    color: white;
}

/* HEADER */
header {
    text-align: center;
    padding: 30px 20px;
}

header h1 {
    font-size: 32px;
    color: gold;
}

header p {
    font-size: 18px;
}

/* UCAPAN */
.ucapan {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    animation: fadeIn 2s;
}

/* GALERI */
.container {
    padding: 20px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 15px;
    transition: 0.4s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.gallery img:hover {
    transform: scale(1.08);
}

/* KARTU */
.card {
    background: rgba(255,255,255,0.1);
    margin: 20px;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    margin-top: 20px;
    color: gold;
}

/* ANIMASI */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body>

<header>
    <h1>🌙 Selamat Idul Fitri 1447 H</h1>
    <p>Mohon Maaf Lahir & Batin</p>
</header>

<div class="ucapan">
    <h2>Keluarga MikhsanRamadhani</h2>
    <p>Di hari yang suci ini, kami sekeluarga mengucapkan mohon maaf lahir dan batin. Semoga kebersamaan ini selalu terjaga ❤️</p>
</div>

<div class="card">
    <h3>📸 Momen Lebaran</h3>
    <p>Kumpulan kenangan lebaran 2026</p>
</div>

<div class="container">
    <div class="gallery">
        <img src="foto1.jpg.jpeg">
        <img src="foto2.jpg.jpeg">
        <img src="foto3.jpg.jpeg">
        <img src="foto4.jpg.jpeg">
    </div>
</div>

<footer>
    <p>✨ Keluarga Ikhsan - 2026 ✨</p>
</footer>

</body>
</html>
